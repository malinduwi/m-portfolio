<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thank You</title>
  <link rel="stylesheet" href="style.css" />

  <style>
    body.thankyou-page {
      margin: 0;
      min-height: 100vh;
      overflow: hidden;
    }

    .thankyou-page .thankyou-section {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .thankyou-page .thankyou-content {
      position: relative;
      z-index: 1;
    }

    .thankyou-logo {
      width: 100px;
      margin-bottom: 20px;

      filter: drop-shadow(0 0 12px rgba(108, 200, 255, 0.5));
      animation: floatLogo 3s ease-in-out infinite;
    }

    @keyframes floatLogo {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-6px);
      }
    }
  </style>
</head>

<body class="thankyou-page">
  <section class="contact-section thankyou-section">
    <div class="thankyou-content">

      <img src="assets/mawi.png" alt="logo" class="thankyou-logo" />

      <p class="section-tag">// secure channel</p>
      <h2>Message Sent</h2>
      <p class="contact-subtext">
        Thank you for reaching out. I’ll get back to you soon.
      </p>
      <br>
      <a href="/" class="btn primary">Back to Home</a>

    </div>
  </section>
</body>
</html>
